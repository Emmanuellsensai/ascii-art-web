<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        form {
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #555;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            resize: vertical;
        }

        .banners {
            display: flex;
            gap: 20px;
            margin: 16px 0;
        }

        .banners label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        button {
            background: #333;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 8px;
        }

        button:hover {
            background: #555;
        }

        .result-box {
            margin-top: 32px;
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        pre {
            background: #ffffff;
            color: #000000;
            padding: 20px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 14px;
            line-height: 1.2;
        }
    </style>
</head>

<body>

    <h1>ASCII Art Generator</h1>

    <form action="/ascii-art" method="POST">

        <label for="text">Enter your text:</label>
        <textarea id="text" name="text" placeholder="Type something... use \n for a new line" required></textarea>

        <label style="margin-top: 16px;">Choose a banner style:</label>
        <div class="banners">
            <label>
                <input type="radio" name="banner" value="standard" checked>
                Standard
            </label>
            <label>
                <input type="radio" name="banner" value="shadow">
                Shadow
            </label>
            <label>
                <input type="radio" name="banner" value="thinkertoy">
                Thinkertoy
            </label>
        </div>

        <button type="submit">Generate</button>

    </form>

    {{if .Result}}
    <div class="result-box">
        <h2>Result:</h2>
        <pre>{{.Result}}</pre>
    </div>
    {{end}}

    {{if .Error}}
    <div class="result-box">
        <p style="color: rgb(255, 0, 0);">{{.Error}}</p>
    </div>
    {{end}}

</body>

</html>
