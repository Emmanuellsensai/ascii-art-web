<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background: #00f7ff;
        }

        h1 {
            color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;

        }

        form {
            background: rgb(0, 0, 0);
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #fff8f8;
        }

        textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            resize: vertical;
        }

        .banners {
            display: flex;
            gap: 20px;
            margin: 16px 0;
        }

        .banners label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        button {
            background: #333;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 8px;
        }

        button:hover {
            background: #555;
        }

        .result-box {
            margin-top: 32px;
            background: rgb(0, 0, 0);
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        pre {
            background: #ffffff;
            color: rgb(0, 0, 0);
            padding: 20px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 14px;
            line-height: 1.2;
        }
    </style>
</head>

<body style="text-align: center;">

    <h1>ASCII Art Generator</h1>

    <form action="/ascii-art" method="POST">

        <!-- Preserves the user's text after form submission -->
        <label for="text"><b>Enter your text:</b></label><br>
        <textarea id="text" name="text" row="4" cols="50" placeholder="Type something...">{{.Text}}</textarea>

        <br><br>
        <label><b>Choose a banner style:</b></label><br>
        <div class="banner" style="display: flex; align-items: center; justify-content: center;">

            <!-- Keeps the selected radio button checked after submission -->
            <label><input type="radio" name="banner" value="standard" {{if eq .Banner "standard" }}checked{{end}}>
                Standard</label><br>
            <label><input type="radio" name="banner" value="shadow" {{if eq .Banner "shadow" }}checked{{end}}>
                Shadow</label><br>
            <label><input type="radio" name="banner" value="thinkertoy" {{if eq .Banner "thinkertoy" }}checked{{end}}>
                Thinkertoy</label><br>
            <br><br>
        </div>

        <button type="submit">Generate</button>

    </form>

    <div class="result" style="text-align: justify;">
        {{if .Result}}
        <h2>Result:</h2>
        <pre>{{.Result}}</pre>
        {{end}}
    </div>
</body>

</html>
